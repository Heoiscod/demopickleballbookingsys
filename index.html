<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Demo-BookPickleBall</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
  :root {
    --blue-900: #0d2d6e;
    --blue-800: #1240a0;
    --blue-700: #1a55c8;
    --blue-600: #2563eb;
    --blue-100: #dbeafe;
    --blue-50: #eff6ff;
    --green-bg: #dcfce7;
    --green-text: #15803d;
    --red-bg: #fee2e2;
    --red-text: #dc2626;
    --gray-bg: #e5e7eb;
    --gray-text: #6b7280;
    --white: #ffffff;
    --body-bg: #f8fafc;
    --border: #e2e8f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--body-bg);
    color: #1e293b;
  }

  /* NAVBAR */
  nav {
    background: var(--blue-900);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
    font-weight: 800;
  }

  .icon {
    width: 32px;
    height: 32px;
    background: var(--blue-600);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
  }

  .nav-actions {
    display: flex;
    gap: 10px;
  }

  .btn-outline {
    background: white;
    border: none;
    padding: 7px 18px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
  }

  .btn-primary {
    background: var(--blue-600);
    color: white;
    border: none;
    padding: 7px 18px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
  }

  /* HAMBURGER */
  .hamburger {
    display: none;
    font-size: 26px;
    color: white;
    cursor: pointer;
  }

  /* MOBILE MENU */
  .mobile-menu {
    display: none;
    flex-direction: column;
    background: var(--blue-900);
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    padding: 10px;
  }

  .mobile-menu button {
    width: 100%;
    margin: 5px 0;
  }

  /* MAIN */
  main {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
  }

  /* TABLE */
  table {
    width: 100%;
    min-width: 600px;
    border-collapse: collapse;
  }

  /* SLOT BUTTONS */
  .slot-btn {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    font-weight: 700;
    cursor: pointer;
  }

  .slot-available { background: var(--green-bg); color: var(--green-text); }
  .slot-booked { background: var(--red-bg); color: var(--red-text); }
  .slot-pending { background: var(--gray-bg); color: var(--gray-text); }

  /* MOBILE */
  @media (max-width: 768px) {

    .nav-actions {
      display: none;
    }

    .hamburger {
      display: block;
    }

    .mobile-menu.active {
      display: flex;
    }
  }

</style>
</head>

<body>

<nav>
  <div class="nav-brand">
    <div class="icon">🏓</div>
    Demo-BookPickleBall
  </div>

  <!-- desktop buttons -->
  <div class="nav-actions">
    <button class="btn-outline">Login</button>
    <button class="btn-primary">My Bookings</button>
  </div>

  <!-- hamburger -->
  <div class="hamburger" onclick="toggleMenu()">☰</div>

  <!-- mobile menu -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="btn-outline">Login</button>
    <button class="btn-primary">My Bookings</button>
  </div>
</nav>

<main>
  <h1>Pickleball Booking System</h1>

  <table border="1">
    <tr>
      <th>Time</th>
      <th>Court 1</th>
      <th>Court 2</th>
    </tr>

    <tr>
      <td>8:00 AM</td>
      <td><button class="slot-btn slot-available">Available</button></td>
      <td><button class="slot-btn slot-booked">Booked</button></td>
    </tr>
  </table>
</main>

<script>
function toggleMenu() {
  document.getElementById("mobileMenu").classList.toggle("active");
}
</script>

</body>
</html>
